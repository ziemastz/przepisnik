spring.application.name=Przepisnik
spring.datasource.url=jdbc:h2:file:${HOME:./data}/przepisnikdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.h2.console.enabled=false
security.jwt.secret=przepisnik-super-secret-key-should-be-at-least-32-bytes-long
security.jwt.expiration-seconds=3600
security.jwt.issuer=Przepisnik
