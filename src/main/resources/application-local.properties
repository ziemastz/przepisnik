spring.datasource.url=jdbc:h2:file:${HOME:${user.home:./data}}/przepisnikdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
security.jwt.secret=${SECURITY_JWT_SECRET:przepisnik-local-dev-secret-key-should-be-at-least-32}
security.jwt.expiration-seconds=${SECURITY_JWT_EXPIRATION_SECONDS:3600}
security.jwt.issuer=${SECURITY_JWT_ISSUER:PrzepisnikLocal}
